<article class="card" tabindex="0" [attr.aria-label]="'Card: ' + card.title">
  <span class="card__strip" aria-hidden="true"></span>
  <div class="card__body">
    <h3 class="card__title">{{ card.title }}</h3>
    @if (card.description) {
      <p class="card__desc">{{ card.description }}</p>
    }
  </div>
  <div class="card__actions">
    <button type="button" class="icon-btn" aria-label="Edit card" (click)="edit.emit(card)">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z" />
      </svg>
    </button>
    <button type="button" class="icon-btn" aria-label="Delete card" (click)="remove.emit(card)">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
      </svg>
    </button>
  </div>
</article>
