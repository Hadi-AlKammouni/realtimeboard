<section class="column" [attr.data-column-id]="id" [attr.aria-label]="title + ' column'">
  <header class="column__header">
    <h2 class="column__title">
      <span class="dot" [class]="'dot--' + id" aria-hidden="true"></span>
      {{ title }}
      <span class="column__count" aria-label="{{ cards.length }} cards">{{ cards.length }}</span>
    </h2>
    <button
      type="button"
      class="ghost-btn"
      (click)="addCard.emit(id)"
      aria-label="Add card to {{ title }}"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>
  </header>

  <div
    class="column__list"
    cdkDropList
    [id]="listId"
    [cdkDropListData]="cards"
    [cdkDropListConnectedTo]="connectedListIds"
    (cdkDropListDropped)="onDrop($event)"
    role="list"
  >
    @for (card of cards; track trackById($index, card)) {
      <div cdkDrag [cdkDragData]="card" class="drag-item">
        <app-card [card]="card" (edit)="editCard.emit($event)" (remove)="removeCard.emit($event)" />
      </div>
    } @empty {
      <div class="empty" role="status">
        <p>No cards yet</p>
        <button class="ghost-btn ghost-btn--text" type="button" (click)="addCard.emit(id)">
          + add your first
        </button>
      </div>
    }
  </div>

  <button type="button" class="column__add" (click)="addCard.emit(id)" aria-label="Add card">
    + add
  </button>
</section>
