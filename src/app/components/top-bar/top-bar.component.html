<header class="top-bar">
  <div class="top-bar__brand">
    <span class="logo" aria-hidden="true">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="4" width="18" height="16" rx="2" />
        <line x1="9" y1="4" x2="9" y2="20" />
        <line x1="15" y1="4" x2="15" y2="20" />
      </svg>
    </span>
    <span class="mono brand-name">RealtimeBoard</span>
    <span
      class="status-pill"
      [class.status-pill--off]="!connected()"
      [attr.aria-label]="connected() ? 'Online' : 'Reconnecting'"
    >
      <span class="status-dot"></span>
      {{ connected() ? 'Live' : 'Reconnecting' }}
    </span>
  </div>

  <div class="top-bar__actions">
    <app-presence />
    <button type="button" class="icon-btn" (click)="toggleTheme.emit()" aria-label="Toggle theme">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
    </button>
    <button type="button" class="btn btn--primary" data-testid="new-card" (click)="add.emit()">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      <span>New card</span>
    </button>
  </div>
</header>
