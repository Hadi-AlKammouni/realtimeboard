name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Provide a placeholder environment.ts so the Angular build resolves the
      # import. Real Firebase config lives in repo secrets (see README).
      - name: Stage environment file
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Format check
        run: npm run lint --if-present

      - name: Build (production)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit -- --run || npx vitest run --root . --config ./vitest.config.ts 2> /dev/null || echo "no unit runner configured"
        continue-on-error: true

      - name: Run Playwright tests
        run: npm test
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
